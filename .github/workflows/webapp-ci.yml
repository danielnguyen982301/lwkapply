name: WebApp CI

on:
  push:
    branches: [master]
    paths:
      - "webapp/**"
      - ".github/workflows/webapp-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "webapp/**"
      - ".github/workflows/webapp-ci.yml"

defaults:
  run:
    working-directory: webapp

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint -- --max-warnings=0

      - name: Format check (prettier)
        run: npm run format:check

      - name: Type check
        run: npm run type-check

      - name: Unit tests (vitest, with coverage)
        run: npm run test:unit -- --coverage

      - name: Build
        run: npm run build
        env:
          # A placeholder is fine here — the build step only needs Vite to
          # succeed, not a real backend to talk to. Real values come from
          # the deploy platform's (Vercel) env config, not from CI.
          VITE_API_BASE_URL: /api/v1
